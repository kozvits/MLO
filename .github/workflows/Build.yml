# Build & Test — MLO Task Manager
# Runs on push to main and on PRs.
# Uses: build, lint, unit tests, optional APK artifact.

name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:          # allow manual trigger from GitHub UI

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:+HeapDumpOnOutOfMemoryError" -Dorg.gradle.daemon=false

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───── Build & Unit Tests ─────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          gradle-home-cache-cleanup: true
          dependency-graph: disabled

      - name: Gradle Wrapper validation
        uses: gradle/actions/wrapper-validation@v4

      - name: Run lint
        run: ./gradlew lint

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MLO-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
          if-no-files-found: error

      - name: Upload lint results
        uses: actions/upload-artifact@v4
        with:
          name: lint-results-${{ github.sha }}
          path: app/build/reports/lint-results*.html
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.sha }}
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 7
          if-no-files-found: ignore

  # ───── Optional: notify on failure ─────
  notify:
    name: Notify
    needs: build
    if: failure() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Mark commit as failed
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              context: 'Build',
              description: 'Build failed — check logs',
              target_url: `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
            });
